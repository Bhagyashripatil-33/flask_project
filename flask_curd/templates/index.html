<h2>Employee List</h2>

<a href="/add">Add Employee</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Salary</th>
<th>Action</th>
</tr>

{% for e in employees %}

<tr>
<td>{{e[0]}}</td>
<td>{{e[1]}}</td>
<td>{{e[2]}}</td>

<td>
<a href="/edit/{{e[0]}}">Edit</a>
<a href="/delete/{{e[0]}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>
