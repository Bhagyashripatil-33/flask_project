
{% extends 'base.html' %}
{% block content %}

<h2>Leave Requests</h2>

<table class="table table-bordered">
<tr>
<th>Employee</th>
<th>Days</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for l in leaves %}
<tr>
<td>{{l.name}}</td>
<td>{{l.days}}</td>
<td>{{l.reason}}</td>
<td>{{l.status}}</td>
<td>
<a class="btn btn-success btn-sm" href="/approve/{{l.id}}">Approve</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
